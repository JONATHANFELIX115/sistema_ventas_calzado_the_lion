{% extends "base.html" %}
{% block content %}
<h2>Inventario Almacén The Lion</h2>

<form action="{{ url_for('buscar') }}" method="GET" style="margin-bottom: 20px;">
    <input type="text" name="query" placeholder="Buscar producto por nombre..." required>
    <button type="submit">🔍 Buscar</button>
    <a href="{{ url_for('index') }}">Ver todos</a>
</form>

<hr>

<table border="1" style="width:100%; border-collapse: collapse; text-align: left;">
    <thead>
        <tr style="background-color: #f2f2f2;">
            <th>ID</th>
            <th>Nombre</th>
            <th>Talla</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Acciones</th>
        </tr>
    </thead>
    <tbody>
        {% for p in productos %}
        <tr>
            <td>{{ p.id }}</td>
            <td>{{ p.nombre }}</td>
            <td>{{ p.talla }}</td>
            <td>${{ p.precio }}</td>
            <td>{{ p.stock }} units</td>
            <td>
                <form action="{{ url_for('eliminar', id=p.id) }}" method="POST" style="display:inline;">
                    <button type="submit" onclick="return confirm('¿Estás seguro de eliminar este calzado?')">Eliminar</button>
                </form>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>

<br><hr>

<h3>Registrar Nuevo Calzado</h3>
<form action="{{ url_for('agregar_producto') }}" method="POST">
    <input type="text" name="nombre" placeholder="Modelo (Ej: Bota Lion)" required>
    <input type="number" name="talla" placeholder="Talla (Ej: 42)" required>
    <input type="number" step="0.01" name="precio" placeholder="Precio" required>
    <input type="number" name="stock" placeholder="Cantidad" required>
    <button type="submit" style="background-color: #d4a017; color: white; cursor: pointer;">Guardar Producto</button>
</form>

{% endblock %}
