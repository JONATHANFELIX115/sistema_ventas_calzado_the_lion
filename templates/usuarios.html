<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Usuarios - The Lion</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
    <h2 class="mb-4">Registro de Usuarios - Almacén The Lion</h2>
    
    <div class="card card-body mb-4 shadow-sm">
        <form action="/registrar_usuario" method="POST" class="row g-3">
            <div class="col-md-3">
                <input type="text" name="nombre" class="form-control" placeholder="Nombre completo" required>
            </div>
            <div class="col-md-3">
                <input type="email" name="mail" class="form-control" placeholder="Correo electrónico" required>
            </div>
            <div class="col-md-3">
                <input type="password" name="password" class="form-control" placeholder="Contraseña" required>
            </div>
            <div class="col-md-3">
                <button type="submit" class="btn btn-success w-100">Registrar Usuario</button>
            </div>
        </form>
    </div>

    <h3>Usuarios Registrados</h3>
    <table class="table table-hover table-bordered">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Email</th>
            </tr>
        </thead>
        <tbody>
            {% for u in usuarios %}
            <tr>
                <td>{{ u.id_usuario }}</td>
                <td>{{ u.nombre }}</td>
                <td>{{ u.mail }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    
    <div class="mt-4">
        <a href="/" class="btn btn-outline-secondary">Volver al Inventario de Calzado</a>
    </div>
</body>
</html>
